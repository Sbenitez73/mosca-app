name: mosca
description: Smart expense tracker for Latin America.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP
  dio: ^5.8.0+1

  # Local database
  sqflite: ^2.4.2
  path_provider: ^2.1.5

  # Navigation
  go_router: ^14.8.1

  # Google auth + Gmail API
  google_sign_in: ^6.3.0

  # iOS Live Activities / Dynamic Island
  live_activities: ^2.4.9

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Background sync
  workmanager: ^0.5.2

  # Android floating overlay (Dynamic Island equivalent)
  flutter_overlay_window: ^0.4.2

  # UI + fonts
  google_fonts: ^6.2.1
  intl: ^0.20.2

  # Charts (stats screen)
  fl_chart: ^0.70.2

  # Splash screen
  flutter_native_splash: ^2.4.3

  # Utils
  equatable: ^2.0.7
  path: ^1.9.0
  timezone: ">=0.9.0 <0.11.0"

  # iOS home screen widget data bridge
  home_widget: ^0.7.0

  # Biometric auth
  local_auth: ^2.3.0

  # Split expense
  image_picker: ^1.1.2
  share_plus: ^10.1.0
  flutter_contacts: ^1.1.9+2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14

dependency_overrides:
  google_sign_in_ios: 5.7.7

flutter:
  uses-material-design: true

flutter_native_splash:
  color: "#0A7E4A"
  color_dark: "#0A7E4A"
  image: assets/splash/splash_icon.png
  image_dark: assets/splash/splash_icon.png
  ios: true
  android: true
